<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // Optimization: Use a faster, smarter Text-Generation model
    env.allowLocalModels = false;
    
    const chatWindow = document.getElementById('chat-window');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    let knowledgeBase = "";
    let generator = null;

    async function initAI() {
        if (generator) return;
        status.innerText = "🧠 Loading Smart Engine (Wait 30s)...";
        try {
            // Switching to a text-generation model that understands instructions
            generator = await pipeline('text-generation', 'Xenova/LaMini-Flan-T5-78M', {
                quantized: true,
                progress_callback: (p) => {
                    status.innerText = `Brain Loading: ${Math.round(p.loaded / p.total * 100)}%`;
                }
            });
            status.innerText = "LearnSphere: Smart Mode";
            chatInput.disabled = false;
        } catch (e) {
            status.innerText = "Error: Check connection";
        }
    }

    // PDF/Image Text Collector (Same as before but cleaner)
    window.addToKnowledge = (name, text) => {
        knowledgeBase += ` Document [${name}]: ${text} `;
        appendMessage('ai', `I have indexed **${name}**. You can now ask specific questions!`);
        initAI();
    };

    sendBtn.addEventListener('click', async () => {
        const query = chatInput.value.trim();
        if (!query || !knowledgeBase) return;

        appendMessage('user', query);
        chatInput.value = "";
        status.innerText = "Searching notes...";

        // THE FIX: "Prompt Engineering"
        // We wrap your question in instructions so the AI doesn't hallucinate.
        const smartPrompt = `Context: ${knowledgeBase.substring(0, 1500)} 
        Question: ${query} 
        Answer based ONLY on the context above. If not found, say "Not in notes".
        Answer:`;

        setTimeout(async () => {
            try {
                const output = await generator(smartPrompt, { 
                    max_new_tokens: 150, 
                    temperature: 0.2, // Low temperature = more accurate, less "creative"
                    repetition_penalty: 1.2 
                });
                
                // Clean up the response to remove the prompt part
                let response = output[0].generated_text.split("Answer:").pop().trim();
                appendMessage('ai', response || "I couldn't find a clear answer in the notes.");
            } catch (err) {
                appendMessage('ai', "My brain is full! Try a smaller PDF.");
            }
            status.innerText = "LearnSphere: Ready";
        }, 100);
    });

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-4`;
        const inner = document.createElement('div');
        inner.className = `max-w-[85%] px-4 py-3 rounded-2xl text-sm ${role === 'user' ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 border border-slate-200 text-slate-800'}`;
        inner.innerText = text;
        div.appendChild(inner);
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>
